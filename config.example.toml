# Terminal configuration

shell = "powershell.exe"
font_family = "Consolas"
font_size = 16.0
scrollback_limit = 10000
columns = 120
rows = 30
opacity = 100
fg_color = "#CCCCCC"
bg_color = "#0C0C0C"

[hotkey]
enabled = true
modifiers = "alt,shift"
key = "v"

# SSH profiles. Press Ctrl+Shift+S to open the picker.
# [[ssh_profiles]]
# name = "my-server"
# host = "example.com"
# port = 22
# user = "myuser"
# auth = "key"              # "key" or "password"
# key_path = "~/.ssh/id_rsa"
# # password = "secret"     # only if auth = "password"
